server:
  port: 9191

#db configuration
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/HotelBoookingDB
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver


  #JPA configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect